<!DOCTYPE html>
<html lang="nb-NO">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 · ainettside.no</title>
<meta name="robots" content="noindex">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%232DE8A8'/%3E%3Ctext x='50' y='68' font-family='Inter,sans-serif' font-size='52' font-weight='800' text-anchor='middle' fill='%230B1226'%3EAI%3C/text%3E%3C/svg%3E">
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&family=JetBrains+Mono:wght@700&display=swap');
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Inter', sans-serif;
  background: #0B1226;
  color: white;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 40px;
  text-align: center;
}
.wrap { max-width: 500px; }
.code {
  font-family: 'JetBrains Mono', monospace;
  font-size: clamp(80px, 16vw, 140px);
  font-weight: 800;
  background: linear-gradient(135deg, #2DE8A8 0%, #22D3EE 50%, #8B5CF6 100%);
  -webkit-background-clip: text;
  background-clip: text;
  -webkit-text-fill-color: transparent;
  line-height: 1;
  margin-bottom: 12px;
  letter-spacing: -0.05em;
}
h1 {
  font-size: 28px;
  font-weight: 800;
  letter-spacing: -0.02em;
  margin-bottom: 10px;
}
p {
  color: rgba(255,255,255,0.65);
  margin-bottom: 28px;
  line-height: 1.6;
}
a {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: linear-gradient(135deg, #2DE8A8 0%, #22D3EE 100%);
  color: #0B1226;
  padding: 12px 24px;
  border-radius: 100px;
  text-decoration: none;
  font-weight: 700;
  font-size: 14px;
  transition: transform 0.15s;
}
a:hover { transform: translateY(-2px); }

/* NAV DROPDOWN */
.nav-dropdown {
  position: relative;
  display: inline-block;
}
.nav-dropdown-trigger {
  background: none;
  border: none;
  cursor: pointer;
  padding: 0;
  color: rgba(255,255,255,0.65);
  font-size: 13.5px;
  font-weight: 500;
  font-family: inherit;
  display: flex;
  align-items: center;
  gap: 4px;
  transition: color 0.15s;
}
.nav-dropdown-trigger:hover { color: white; }
.nav-dropdown:hover .nav-dropdown-trigger { color: white; }
.nav-dropdown:hover .nav-dropdown-trigger svg { transform: rotate(180deg); }
.nav-dropdown-trigger svg { transition: transform 0.2s; }

.nav-dropdown-menu {
  position: absolute;
  top: 100%;
  left: -16px;
  margin-top: 10px;
  background: #0F1832;
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 14px;
  padding: 8px;
  min-width: 280px;
  box-shadow: 0 10px 40px rgba(0,0,0,0.3);
  opacity: 0;
  visibility: hidden;
  transform: translateY(-8px);
  transition: all 0.2s ease;
  z-index: 60;
}

.nav-dropdown:hover .nav-dropdown-menu,
.nav-dropdown:focus-within .nav-dropdown-menu {
  opacity: 1;
  visibility: visible;
  transform: translateY(0);
}

.nav-dropdown-item {
  display: flex;
  flex-direction: column;
  padding: 12px 14px;
  border-radius: 10px;
  text-decoration: none;
  transition: background 0.12s;
}
.nav-dropdown-item:hover {
  background: #0B1226;
}
.nav-dropdown-item strong {
  color: white;
  font-size: 14px;
  font-weight: 600;
  margin-bottom: 2px;
}
.nav-dropdown-item span {
  color: rgba(255,255,255,0.55);
  font-size: 12.5px;
  font-weight: 400;
}

.nav-ai-indeks {
  background: rgba(45,232,168,0.06);
  border: 1.5px solid #5FE388;
  color: #2DE8A8 !important;
  padding: 8px 16px;
  border-radius: 10px;
  text-decoration: none;
  font-weight: 700;
  font-size: 12px;
  letter-spacing: 0.02em;
  font-family: 'JetBrains Mono', monospace;
  transition: all 0.15s;
}
.nav-ai-indeks:hover {
  background: rgba(45,232,168,0.12);
  color: #2DE8A8 !important;
}

/* FOOTER TAGS */
.footer-tags {
  display: flex;
  gap: 8px;
  margin-top: 12px;
  flex-wrap: wrap;
}
.footer-tag {
  background: rgba(255,255,255,0.05);
  color: rgba(255,255,255,0.7);
  padding: 4px 10px;
  border-radius: 100px;
  font-size: 11.5px;
  font-weight: 600;
  letter-spacing: 0.02em;
}
.footer-tag-ai {
  background: rgba(45,232,168,0.08);
  color: #2DE8A8;
}
.footer-col-ai strong { color: #2DE8A8 !important; }
.footer-ai-link {
  font-family: 'JetBrains Mono', monospace !important;
  font-size: 12.5px !important;
  color: rgba(45,232,168,0.7) !important;
}
.footer-ai-link:hover { color: #2DE8A8 !important; }

@media (max-width: 860px) {
  .nav-dropdown-menu { display: none; }
}

</style>
</head>
<body>
<div class="wrap">
  <div class="code">404</div>
  <h1>Siden finnes ikke</h1>
  <p>Akkurat denne siden er ikke bygget med AI ennå. Prøv heller hovedsiden.</p>
  <a href="/">← Til forsiden</a>
</div>
</body>
</html>
